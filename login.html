<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login page</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <header class="header">
      <figure>
        <img
          src="images/medium_logo.png"
          width="60"
          height="59"
          alt="company_logo"
        />
      </figure>
      <h1>DOC Tracker</h1>
    </header>
    <main class="main">
      <div class="login-section">
        <div class="login-section_title object-image">
          <figure>
            <img
              src="images/small_logo.png"
              width="43px"
              height="42"
              alt="company_logo"
            />
          </figure>
          <h2 class="text">DOC Tracker</h2>
        </div>
        <section class="login-section_form">
          <form action="">
            <div class="form-element">
              <input type="text" id="email" name="email" placeholder="Email" />

              <input
                type="password"
                id="password"
                name="password"
                placeholder="password"
              />

              <input type="submit" value="Login" class="button" />
              <a href="">Forgot Password?</a>
            </div>
          </form>
        </section>
      </div>
    </main>
  </body>
</html>
