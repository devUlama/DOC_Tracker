<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignUp page</title>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>
  </head>
  <body>
    <header class="header">
      <figure class="static-image">
        <img
          src="images/medium_logo.png"
          width="60"
          height="59"
          alt="company_logo"
        />
      </figure>
      <h1 class="wrap header-text">DOC Tracker</h1>

      <div class="signUp-button header-button">
        <a class="button wrap" href="login.html">Login</a>
      </div>
    </header>
    <main class="main">
      <div class="login-section">
        <div
          class="login-section_title object-image object-image--center-align"
        >
          <figure>
            <img
              src="images/small_logo.png"
              width="43px"
              height="42"
              alt="company_logo"
            />
          </figure>
          <h2 class="text wrap">DOC Tracker</h2>
        </div>
        <section class="login-section_form">
          <form action="product.html">
            <div class="form-element">
              <input
                type="text"
                id="name"
                name="user-name"
                placeholder="Full Name"
              />

              <input
                type="text"
                id="farm_name"
                name="farm_name"
                placeholder="Farm Name"
              />

              <input
                type="text"
                id="farm_address"
                name="farm_address"
                placeholder="Farm Address"
              />

              <input type="email" id="email" name="email" placeholder="Email" />

              <input
                type="password"
                id="password"
                name="password"
                placeholder="password"
              />
              <input
                type="password"
                id="confirm-password"
                name="confirm-password"
                placeholder="confirm-password"
              />

              <input type="submit" value="Register" class="button" />

              <p class="center-text">
                Already have an account
                <a href="login.html" class="inline-link">Login</a>
              </p>
            </div>
          </form>
        </section>
      </div>
    </main>
  </body>
</html>
